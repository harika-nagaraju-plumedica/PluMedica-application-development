org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# IMPORTANT: Architecture Configuration
# Force arm64 builds only for smaller APK size and stable Windows AOT builds
# 32-bit ARM (armeabi-v7a) fails on Windows with AOT compiler error -1073741701
# This is a known Flutter/Dart issue on Windows
# If 32-bit support is needed, build on Linux/Mac instead
flutter.abis=arm64-v8a

# Force default Flutter target platform to arm64 so plain `flutter build apk --release`
# does not produce a universal multi-ABI APK.
target-platform=android-arm64
